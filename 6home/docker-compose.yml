services:
  game:
    build: ./server
    restart: unless-stopped
    environment:
      DATA_DIR: /app/data
      PORT: "8081"
      TURN_SECONDS: "20"
    volumes:
      - ./data:/app/data
    expose:
      - "8081"

  web:
    build: ./web
    restart: unless-stopped
    depends_on:
      - game
    ports:
      - "${WEB_PORT:-4188}:80"
