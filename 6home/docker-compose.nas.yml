services:
  game:
    build: ./server
    restart: unless-stopped
    environment:
      DATA_DIR: /app/data
      PORT: "8081"
      TURN_SECONDS: "20"
    volumes:
      - /vol2/1000/docker/zaliujia/data:/app/data
    expose:
      - "8081"

  web:
    build: ./web
    restart: unless-stopped
    depends_on:
      - game
    ports:
      - "4188:80"
